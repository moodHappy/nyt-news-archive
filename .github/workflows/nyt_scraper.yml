name: Auto Scrape NYT Chinese

# 触发条件：仅支持在 GitHub Actions 网页上手动点击运行
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 赋予 github-actions 机器人写入并推送到代码库的权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python nyt_reader.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 将所有生成的新文件（如 docs 目录的 html、更改的 index.html、last_nyt_url.txt）添加到暂存区
          git add .
          
          # 判断是否有变动：如果有新文章或配置更新就提交，如果没有变动就安全退出，不报错
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto update NYT Chinese archive"
            git push
          else
            echo "头条未更新或无新文件生成，本次无需提交。"
          fi
